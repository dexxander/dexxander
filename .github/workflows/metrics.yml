name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:

  habits-charts:

    runs-on: ubuntu-latest

    steps:

      - uses: lowlighter/metrics@latest

        with:

          token: ${{ secrets.METRICS_TOKEN }}

          user: dexxander

          filename: github-metrics/habits-charts.svg

          plugin_habits: yes
          plugin_habits_from: 400
          plugin_habits_days: 30

          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes

          plugin_habits_facts: no

  habits-facts:

    runs-on: ubuntu-latest

    steps:

      - uses: lowlighter/metrics@latest

        with:

          token: ${{ secrets.METRICS_TOKEN }}

          user: dexxander

          filename: github-metrics/habits-facts.svg

          plugin_habits: yes
          plugin_habits_from: 400
          plugin_habits_days: 30

          plugin_habits_charts: no
          plugin_habits_facts: yes
